<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web QR 掃描測試 - ZXing</title>
  <script src="https://unpkg.com/@zxing/browser@latest"></script>
  <style>
    body {
      margin: 0;
      padding: 14px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    video {
      width: 100%;
      background: #000;
      border-radius: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      font-size: 18px;
      font-weight: 700;
      border: 0;
      border-radius: 10px;
      color: white;
      background: #2563eb;
    }

    .panel {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #1f2937;
      word-break: break-all;
    }

    .ok { color: #86efac; }
    .warn { color: #facc15; }
    .bad { color: #fca5a5; }

    pre {
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.45;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Web QR 掃描測試：ZXing</h1>

    <video id="video" playsinline muted></video>

    <button id="startBtn">開始掃描</button>
    <button id="stopBtn">停止掃描</button>

    <div class="panel">
      <div>掃描結果：</div>
      <div id="result" class="warn">尚未掃描</div>
    </div>

    <div class="panel">
      <div>狀態：</div>
      <pre id="status">等待開始</pre>
    </div>
  </div>

<script>
const video = document.getElementById("video");
const resultEl = document.getElementById("result");
const statusEl = document.getElementById("status");

let codeReader = null;
let controls = null;

function log(msg) {
  const now = new Date().toLocaleTimeString();
  statusEl.textContent = `[${now}] ${msg}\n` + statusEl.textContent;
}

async function startScan() {
  try {
    resultEl.textContent = "啟動中...";
    resultEl.className = "warn";

    codeReader = new ZXingBrowser.BrowserQRCodeReader();

    controls = await codeReader.decodeFromConstraints(
      {
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        },
        audio: false
      },
      video,
      (result, error, controls) => {
        const track = video.srcObject?.getVideoTracks?.()[0];
        if (track) {
          const s = track.getSettings();
          if (!window.__loggedSettings) {
            window.__loggedSettings = true;
            log("track settings: " + JSON.stringify(s));
            log(`video size: ${video.videoWidth}x${video.videoHeight}`);
          }
        }

        if (result) {
          resultEl.textContent = result.getText();
          resultEl.className = "ok";
          log("掃到：" + result.getText());
        }
      }
    );

    log("ZXing started");
  } catch (err) {
    resultEl.textContent = "啟動失敗：" + err;
    resultEl.className = "bad";
    log("error: " + err);
  }
}

function stopScan() {
  if (controls) {
    controls.stop();
    controls = null;
  }
  log("已停止");
}

document.getElementById("startBtn").addEventListener("click", startScan);
document.getElementById("stopBtn").addEventListener("click", stopScan);
</script>
</body>
</html>
