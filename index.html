<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web QR 掃描測試 - BarcodeDetector</title>
  <style>
    body {
      margin: 0;
      padding: 14px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
    }

    video {
      width: 100%;
      background: #000;
      border-radius: 12px;
    }

    canvas {
      display: none;
    }

    button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      font-size: 18px;
      font-weight: 700;
      border: 0;
      border-radius: 10px;
      color: white;
      background: #2563eb;
    }

    .panel {
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      background: #1f2937;
      word-break: break-all;
    }

    .ok { color: #86efac; }
    .warn { color: #facc15; }
    .bad { color: #fca5a5; }

    pre {
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.45;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Web QR 掃描測試：BarcodeDetector</h1>

    <video id="video" playsinline muted></video>
    <canvas id="canvas"></canvas>

    <button id="startBtn">開始掃描</button>
    <button id="stopBtn">停止掃描</button>

    <div class="panel">
      <div>掃描結果：</div>
      <div id="result" class="warn">尚未掃描</div>
    </div>

    <div class="panel">
      <div>狀態：</div>
      <pre id="status">等待開始</pre>
    </div>
  </div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const resultEl = document.getElementById("result");
const statusEl = document.getElementById("status");

let stream = null;
let scanning = false;
let detector = null;

function log(msg) {
  const now = new Date().toLocaleTimeString();
  statusEl.textContent = `[${now}] ${msg}\n` + statusEl.textContent;
}

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: "environment" },
      width: { ideal: 1920 },
      height: { ideal: 1080 }
    },
    audio: false
  });

  video.srcObject = stream;
  await video.play();

  await new Promise(resolve => {
    if (video.readyState >= 2) resolve();
    else video.onloadedmetadata = resolve;
  });

  const track = stream.getVideoTracks()[0];
  log("track settings: " + JSON.stringify(track.getSettings()));
  log(`video size: ${video.videoWidth}x${video.videoHeight}`);
}

async function startScan() {
  if (scanning) return;

  if (!("BarcodeDetector" in window)) {
    resultEl.textContent = "此瀏覽器不支援 BarcodeDetector，請用 Android Chrome 測，或改測 ZXing 版。";
    resultEl.className = "bad";
    log("BarcodeDetector not supported");
    return;
  }

  const formats = await BarcodeDetector.getSupportedFormats();
  log("supported formats: " + formats.join(", "));

  if (!formats.includes("qr_code")) {
    resultEl.textContent = "此瀏覽器 BarcodeDetector 不支援 qr_code";
    resultEl.className = "bad";
    return;
  }

  detector = new BarcodeDetector({ formats: ["qr_code"] });

  try {
    await startCamera();
    scanning = true;
    resultEl.textContent = "掃描中...";
    resultEl.className = "warn";
    scanLoop();
  } catch (err) {
    resultEl.textContent = "啟動相機失敗：" + err;
    resultEl.className = "bad";
    log("camera error: " + err);
  }
}

async function scanLoop() {
  if (!scanning) return;

  const t0 = performance.now();

  try {
    const codes = await detector.detect(video);
    const cost = Math.round(performance.now() - t0);

    if (codes.length > 0) {
      const text = codes[0].rawValue;
      resultEl.textContent = text;
      resultEl.className = "ok";
      log(`掃到 ${codes.length} 個，耗時 ${cost}ms：${text}`);
    } else {
      log(`未掃到，耗時 ${cost}ms`);
    }
  } catch (err) {
    log("detect error: " + err);
  }

  setTimeout(scanLoop, 250);
}

async function stopScan() {
  scanning = false;

  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }

  video.srcObject = null;
  log("已停止");
}

document.getElementById("startBtn").addEventListener("click", startScan);
document.getElementById("stopBtn").addEventListener("click", stopScan);
</script>
</body>
</html>
